name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka

      - name: Build
        shell: bash
        run: |
          python -m nuitka --standalone --onefile-tree=dist/tree --output-dir=dist main.py

      - name: Package
        run: |
          cd dist/tree && powershell -Command "Compress-Archive -Path * -DestinationPath ../MinecraftServerManager-windows.zip -Force"
          cd ..
          ren tree\main.exe MinecraftServerManager-windows.exe 2>/dev/null || true
          cp tree/main.exe MinecraftServerManager-windows.exe 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-windows
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka

      - name: Build
        run: python -m nuitka --standalone --onefile-tree=dist/tree --output-dir=dist main.py

      - name: Package
        run: |
          cd dist/tree && zip -r ../MinecraftServerManager-macos.zip * 
          cd ..
          cp tree/main MinecraftServerManager-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-macos
          path: dist/MinecraftServerManager-macos*

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka

      - name: Build
        run: python -m nuitka --standalone --onefile-tree=dist/tree --output-dir=dist main.py

      - name: Package
        run: |
          cd dist/tree && tar -czf ../MinecraftServerManager-linux.tar.gz *
          cd ..
          cp tree/main MinecraftServerManager-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-linux
          path: dist/MinecraftServerManager-linux*

  release:
    needs: [build-windows, build-macos, build-linux]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/MinecraftServerManager-windows.exe
            dist/MinecraftServerManager-macos
            dist/MinecraftServerManager-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}