name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard

      - name: Build
        run: |
          python -m nuitka --standalone --onefile --output-dir=dist --disable-console main.py 2>&1 | Out-Null
          if (Test-Path dist/main.exe) { Copy-Item dist/main.exe MinecraftServerManager-windows.exe }
          if (Test-Path dist/src) { Copy-Item -Recurse dist/src . }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-windows
          path: MinecraftServerManager-windows.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard

      - name: Build
        run: |
          python -m nuitka --standalone --onefile --output-dir=dist --disable-console main.py 2>/dev/null || true
          cp -r src . 2>/dev/null || true
          ls -la dist/

      - name: Rename
        run: |
          mv dist/main* MinecraftServerManager-macos 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-macos
          path: MinecraftServerManager-macos

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard

      - name: Build
        run: |
          python -m nuitka --standalone --onefile --output-dir=dist --disable-console main.py 2>/dev/null || true
          cp -r src . 2>/dev/null || true
          ls -la dist/

      - name: Rename
        run: |
          mv dist/main* MinecraftServerManager-linux 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-linux
          path: MinecraftServerManager-linux

  release:
    needs: [build-windows, build-macos, build-linux]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/MinecraftServerManager-windows.exe
            dist/MinecraftServerManager-macos
            dist/MinecraftServerManager-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}