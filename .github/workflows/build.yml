name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard

      - name: Build
        run: python -m nuitka --standalone --onefile --output-dir=dist main.py

      - name: Find exe
        run: |
          Get-ChildItem dist/*.exe | Select-Object -First 1 | Copy-Item -Destination MinecraftServerManager-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-windows
          path: MinecraftServerManager-windows.exe

  build-macos:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard

      - name: Build
        run: python -m nuitka --standalone --onefile --output-dir=dist main.py

      - name: Rename
        run: mv dist/main* MinecraftServerManager-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-macos
          path: MinecraftServerManager-macos

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt nuitka zstandard

      - name: Build
        run: python -m nuitka --standalone --onefile --output-dir=dist main.py

      - name: Rename
        run: mv dist/main* MinecraftServerManager-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinecraftServerManager-linux
          path: MinecraftServerManager-linux

  release:
    needs: [build-windows, build-macos, build-linux]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/MinecraftServerManager-windows.exe
            dist/MinecraftServerManager-macos
            dist/MinecraftServerManager-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}